import:
 - ~/.config/alacritty/themes/hyper.yaml

env:
  TERM: alacritty

window:
  dimensions:
   columns: 120
   lines: 30
  padding:
   x: 0
   y: 0
  opacity: 1.0

font:
  normal:
    family: JetBrains Mono
    style: SemiBold
  bold:
    family: JetBrains Mono
    style: Bold
  italic:
    family: JetBrains Mono
    style: Italic
  bold_italic:
    family: JetBrains Mono
    style: Bold Italic
  size: 12.0

shell:
 program: tmux

live_config_reload: true
